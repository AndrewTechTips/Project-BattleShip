<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BattleShip</title>

        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%230f172a' stroke='%2338bdf8' stroke-width='8'/><line x1='50' y1='0' x2='50' y2='100' stroke='%2338bdf8' stroke-width='4'/><line x1='0' y1='50' x2='100' y2='50' stroke='%2338bdf8' stroke-width='4'/><circle cx='70' cy='30' r='8' fill='%23ef4444'/></svg>">
    </head>
    
    <body>
        <header>
            <h1>BattleShip</h1>
            <p id="status-display">Place your fleet, Commander.</p>
        </header>

        <div class="controls">
            <button id="rotate-btn">Rotate Ships: Horizontal</button>
            <button id="randomize-btn">Randomize Fleet</button>
            <button id="start-game-btn" class="primary" disabled>Start Game</button>
        </div>

        <div class="action-bar" style = "text-align: center; margin-bottom: 1rem;">
             <button id="reset-btn" style="display: none;">Reset Game / Play Again</button>
        </div>

        <div id="fleet-container" class="fleet">

        </div>
        
        <main class="game-container">
            <div class="player-section">
                <h2>Your Fleet <span id="player-counter" class="counter"></span></h2>
                <div id="player-board" class="board"></div>
            </div>

            <div class="player-section">
                <h2>Enemy <span id="cpu-counter" class="counter"></span></h2>
                <div id="computer-board" class="board disabled"></div>
            </div>
        </main>

    </body>

</html>
